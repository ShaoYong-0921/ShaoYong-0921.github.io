name: Build views API image

on:
  push:
    branches: [ main ]
    paths:
      - "api/**"
      - ".github/workflows/api-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r api/requirements.txt httpx
      - name: Run unit tests
        working-directory: api
        run: python -m unittest test_main -v
        env:
          VIEWS_DB: /tmp/views-test/views.db

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU (arm64)
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: api
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/shaoyong-0921/views-api:latest
            ghcr.io/shaoyong-0921/views-api:${{ github.sha }}
