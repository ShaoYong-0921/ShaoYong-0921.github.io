name: homepi

services:
  couchdb:
    image: couchdb:3
    container_name: couchdb
    restart: unless-stopped
    environment:
      COUCHDB_USER: ${COUCHDB_USER}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
    ports:
      # 預設只綁 localhost；派上請在 .env 設 BIND_IP 為 Tailscale IP，
      # 讓 CouchDB 只在私網可達、永不暴露公網（spec §3）
      - "${BIND_IP:-127.0.0.1}:5984:5984"
    volumes:
      - ${COUCHDB_DATA_DIR:-./data/couchdb}:/opt/couchdb/data
      # 00- 前綴讓 docker.ini 成為設定鏈最後一檔：CouchDB 的執行期寫入（含管理
      # 員密碼雜湊）會落在容器內部的 docker.ini，而不是這個檔案
      # （不可加 :ro——entrypoint 會 chown 設定目錄，唯讀掛載使容器無法啟動）
      - ./couchdb/livesync.ini:/opt/couchdb/etc/local.d/00-livesync.ini

  # M4 瀏覽統計 API（docs/design/views-api.md）；port 只綁 Tailscale，
  # 公網流量之後經 Cloudflare Tunnel 進來。Phase 2 會改用 ghcr.io 映像 + Watchtower
  views-api:
    build: ../api
    container_name: views-api
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "${BIND_IP:-127.0.0.1}:8000:8000"
    volumes:
      - ./views-data:/data

  # 瀏覽器 IDE（取代原生 code-server.service）：工具鏈含 Node22/pnpm/Python，
  # 沿用原有密碼/擴充/Tailscale 憑證（掛載原設定目錄），只在 Tailscale IP 可達
  code-server:
    build: ./code-server
    container_name: code-server
    restart: unless-stopped
    hostname: homepi
    ports:
      - "${BIND_IP:-127.0.0.1}:8090:8080"
    command: >
      --bind-addr 0.0.0.0:8080
      --cert /home/coder/.config/code-server/homepi.tail890983.ts.net.crt
      --cert-key /home/coder/.config/code-server/homepi.tail890983.ts.net.key
      /home/coder/Desktop
    volumes:
      - /home/homepi/Desktop:/home/coder/Desktop
      - /home/homepi/.config/code-server:/home/coder/.config/code-server
      - /home/homepi/.local/share/code-server:/home/coder/.local/share/code-server
      - /home/homepi/.gitconfig:/home/coder/.gitconfig:ro
      - /home/homepi/.ssh:/home/coder/.ssh:ro
      - ./code-server/bashrc:/home/coder/.bashrc:ro

  # CouchDB ⇄ 派上 vault 資料夾的雙向橋（convert.py 吃資料夾）
  # 前置：git clone --recursive https://github.com/vrtmrz/livesync-bridge
  #       設定在 livesync-bridge-dat/config.json（含機密，不進 git）
  livesync-bridge:
    build: ./livesync-bridge
    container_name: livesync-bridge
    restart: unless-stopped
    depends_on:
      - couchdb
    # 以 host 使用者身分執行，vault 掛載才有寫入權（映像預設的 deno uid 寫不進）
    # DENO_DIR/HOME 指向可寫掛載：deno 的模組快取與 localStorage 狀態都需要寫入
    # （livesync-bridge-dat/deno 需先以一般使用者建立，否則 docker 會建成 root 所有）
    user: "1000:1000"
    environment:
      DENO_DIR: /deno-data/cache
      HOME: /deno-data
    volumes:
      - ./livesync-bridge-dat:/app/dat
      - ${VAULT_DIR:-/home/homepi/Desktop/vault}:/app/data/vault
      - ./livesync-bridge-dat/deno:/deno-data
